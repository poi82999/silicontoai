<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="{{ '/' | relative_url }}">🗺️&nbsp;<span>NPU 학습 로그</span></a>
      <div class="nav-links">
        <a href="{{ '/study_guide/roadmap_index.html' | relative_url }}">지도</a>
        <a href="{{ '/study_guide/personal_roadmap_2026.html' | relative_url }}">시간표</a>
        <a href="{{ '/study_guide/journal/' | relative_url }}">일기</a>
        <a href="https://github.com/poi82999/silicontoai" target="_blank" rel="noopener">GitHub ↗</a>
        <button id="themeToggle" aria-label="라이트/다크 테마 전환" title="테마 전환">◐</button>
      </div>
    </div>
  </nav>

  {% if page.hero %}
  <main class="full">{{ content }}</main>
  {% else %}
  <main class="wrap"><article class="prose">{{ content }}</article></main>
  {% endif %}

  <footer class="footer">
    <div class="wrap footer-inner">
      <div>© 2026 신민석 · <a href="https://github.com/poi82999/silicontoai">poi82999/silicontoai</a></div>
      <div class="muted mono">Jekyll · GitHub Pages · last build {{ site.time | date: "%Y-%m-%d" }}</div>
    </div>
  </footer>

  <script type="module">
    const mermaidDivs = document.querySelectorAll('div.language-mermaid');
    if (mermaidDivs.length) {
      mermaidDivs.forEach(d => {
        const pre = document.createElement('pre');
        pre.className = 'mermaid';
        pre.textContent = d.textContent;
        d.replaceWith(pre);
      });
      const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
      const dark = document.documentElement.getAttribute('data-theme') === 'dark' ||
        (!document.documentElement.getAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      mermaid.initialize({ startOnLoad: true, theme: dark ? 'dark' : 'neutral' });
    }
  </script>
  <script>
    document.getElementById('themeToggle').addEventListener('click', function () {
      var cur = document.documentElement.getAttribute('data-theme');
      var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var eff = cur || (sysDark ? 'dark' : 'light');
      var next = eff === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
