name: L6 Toolchain CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "l6/**"
      - "workloads/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "l6/**"
      - "workloads/**"
      - "pyproject.toml"

jobs:
  l6-tests:
    runs-on:
      - self-hosted
      - windows
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run L6 unit tests
        shell: powershell
        run: |
          python -m pytest l6/tests -v --tb=short -x --ignore=l6/tests/test_asset_drift.py --ignore=l6/tests/test_m3_ops_tracer.py -k "not nn_module"

      - name: Run asset drift gate
        shell: powershell
        run: |
          python -m pytest l6/tests/test_asset_drift.py -v --tb=long

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l6-test-results
          path: |
            l6/generated/
          retention-days: 7
