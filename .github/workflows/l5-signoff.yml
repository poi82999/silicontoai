name: L5 Signoff

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  l5-signoff:
    runs-on:
      - self-hosted
      - windows
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell scripts for WSL
        shell: powershell
        run: |
          $workspaceWin = "${{ github.workspace }}" -replace '\\','/'
          $workspace = wsl wslpath -u "$workspaceWin"
          wsl bash -lc "cd '$workspace' && find scripts -name '*.sh' -print0 | xargs -0 sed -i 's/\r$//'"
          wsl bash -lc "cd '$workspace' && chmod +x scripts/*.sh"

      - name: Run one-shot L5 signoff
        shell: powershell
        run: |
          $workspaceWin = "${{ github.workspace }}" -replace '\\','/'
          $workspace = wsl wslpath -u "$workspaceWin"
          wsl bash -lc "cd '$workspace' && make l5-signoff"

      - name: Run repeatability check
        shell: powershell
        run: |
          $workspaceWin = "${{ github.workspace }}" -replace '\\','/'
          $workspace = wsl wslpath -u "$workspaceWin"
          wsl bash -lc "cd '$workspace' && make l5-repeatability"

      - name: Upload L5 signoff artifacts
        uses: actions/upload-artifact@v4
        with:
          name: l5-signoff-artifacts
          path: |
            sim/verify/l5_signoff
            sim/verify/l5_repeatability