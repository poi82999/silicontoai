name: Workload Regression

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/workload-regression.yml"
      - "rtl/**"
      - "tb/**"
      - "host/**"
      - "workloads/**"
      - "scripts/run_l5_signoff.sh"
      - "scripts/check_l5_repeatability.sh"
  pull_request:
    paths:
      - ".github/workflows/workload-regression.yml"
      - "rtl/**"
      - "tb/**"
      - "host/**"
      - "workloads/**"
      - "scripts/run_l5_signoff.sh"
      - "scripts/check_l5_repeatability.sh"

jobs:
  workload-regression:
    runs-on:
      - self-hosted
      - windows
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell scripts for WSL
        shell: powershell
        run: |
          $workspaceWin = "${{ github.workspace }}" -replace '\\','/'
          $workspace = wsl wslpath -u "$workspaceWin"
          wsl bash -lc "cd '$workspace' && find scripts -name '*.sh' -print0 | xargs -0 sed -i 's/\r$//'"
          wsl bash -lc "cd '$workspace' && chmod +x scripts/*.sh"

      - name: Run INT8 one-shot signoff gate
        shell: powershell
        run: |
          $workspaceWin = "${{ github.workspace }}" -replace '\\','/'
          $workspace = wsl wslpath -u "$workspaceWin"
          wsl bash -lc "cd '$workspace' && bash scripts/run_l5_signoff.sh --mode int8"

      - name: Run FP16 smoke signoff gate
        shell: powershell
        run: |
          $workspaceWin = "${{ github.workspace }}" -replace '\\','/'
          $workspace = wsl wslpath -u "$workspaceWin"
          wsl bash -lc "cd '$workspace' && bash scripts/run_l5_signoff.sh --mode fp16"

      - name: Run repeatability gate
        shell: powershell
        run: |
          $workspaceWin = "${{ github.workspace }}" -replace '\\','/'
          $workspace = wsl wslpath -u "$workspaceWin"
          wsl bash -lc "cd '$workspace' && bash scripts/check_l5_repeatability.sh"

      - name: Upload workload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workload-regression-artifacts
          path: |
            sim/verify/l5_signoff
            sim/verify/l5_repeatability
          retention-days: 7
